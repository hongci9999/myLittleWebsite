# main лі‘н•©(лҳҗлҠ” мҲҳлҸҷ мӢӨн–ү) мӢң AWSм—җ н”„лЎ нҠё(S3)В·API(Elastic Beanstalk) л°°нҸ¬
# м„ н–ү м„Өм •: docs/learnings/0032-cicd-github-actions-aws.md
#
# Repository variables (Settings вҶ’ Secrets and variables вҶ’ Actions вҶ’ Variables):
#   AWS_REGION                  мҳҲ: ap-northeast-2
#   S3_BUCKET_FRONTEND          н”„лЎ нҠё dist лҸҷкё°нҷ” лҢҖмғҒ (л№„мҡ°л©ҙ н”„лЎ нҠё л°°нҸ¬ мғқлһө)
#   CLOUDFRONT_DISTRIBUTION_ID  (м„ нғқ) мәҗмӢң л¬ҙнҡЁнҷ”
#   VITE_API_BASE_URL           (м„ нғқ) нҒҙлқјмқҙм–ёнҠё л№Ңл“ң мӢң API лІ мқҙмҠӨ (мҳҲ: https://xxx.elasticbeanstalk.com)
#   EB_APPLICATION_NAME         API л°°нҸ¬ мӢң н•„мҲҳ
#   EB_ENVIRONMENT_NAME         API л°°нҸ¬ мӢң н•„мҲҳ
#   EB_S3_BUCKET                EB м• н”ҢлҰ¬мјҖмқҙм…ҳ лІ„м „ zip м—…лЎңл“ң лІ„нӮ· (мҪҳмҶ” EB вҶ’ м•ұ вҶ’ лІ„м „м—җм„ң нҷ•мқё)
#   EB_HEALTH_CHECK_URL         (м„ нғқ) л°°нҸ¬ нӣ„ curl кІҖмҰқ URL (мҳҲ: https://xxx.elasticbeanstalk.com/api/health)
#
# Repository secret:
#   AWS_ROLE_ARN                OIDCлЎң assume н•  IAM м—ӯн•  ARN
#
# IAM м—ӯн•  мӢ лў° м •мұ… мҳҲ: repo:OWNER/REPO:ref:refs/heads/main лҳҗлҠ” environment:production

name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-aws-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    # OIDC мӢ лў° м •мұ…мқ„ environmentлЎң мўҒнһҗ л•Ң мӮ¬мҡ© (м—Ҷмңјл©ҙ мЈјм„қ мІҳлҰ¬ к°ҖлҠҘ)
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure deploy targets are configured
        run: |
          if [ -z "${{ vars.S3_BUCKET_FRONTEND }}" ] && [ -z "${{ vars.EB_ENVIRONMENT_NAME }}" ]; then
            echo "::error::Set repository variable S3_BUCKET_FRONTEND and/or EB_* (see workflow header comments)."
            exit 1
          fi
          if [ -z "${{ secrets.AWS_ROLE_ARN }}" ]; then
            echo "::error::Set repository secret AWS_ROLE_ARN (IAM role for OIDC)."
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Build and deploy frontend (S3)
        if: vars.S3_BUCKET_FRONTEND != ''
        env:
          S3_BUCKET: ${{ vars.S3_BUCKET_FRONTEND }}
          CF_DIST_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: |
          npm ci
          npm run build -w client
          aws s3 sync client/dist/ "s3://${S3_BUCKET}/" --delete
          aws s3 cp client/dist/index.html "s3://${S3_BUCKET}/index.html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"
          if [ -n "${CF_DIST_ID}" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "${CF_DIST_ID}" \
              --paths "/*"
          fi

      - name: Package API for Elastic Beanstalk
        if: >-
          vars.EB_ENVIRONMENT_NAME != '' &&
          vars.EB_APPLICATION_NAME != '' &&
          vars.EB_S3_BUCKET != ''
        run: bash scripts/package-eb-bundle.sh api-eb-bundle.zip

      - name: Deploy API to Elastic Beanstalk
        if: >-
          vars.EB_ENVIRONMENT_NAME != '' &&
          vars.EB_APPLICATION_NAME != '' &&
          vars.EB_S3_BUCKET != ''
        env:
          EB_APP: ${{ vars.EB_APPLICATION_NAME }}
          EB_ENV: ${{ vars.EB_ENVIRONMENT_NAME }}
          EB_BUCKET: ${{ vars.EB_S3_BUCKET }}
        run: |
          VERSION_LABEL="gh-${GITHUB_SHA::7}-${GITHUB_RUN_NUMBER}"
          S3_KEY="deploy/${VERSION_LABEL}.zip"
          aws s3 cp api-eb-bundle.zip "s3://${EB_BUCKET}/${S3_KEY}"
          aws elasticbeanstalk create-application-version \
            --application-name "${EB_APP}" \
            --version-label "${VERSION_LABEL}" \
            --source-bundle "S3Bucket=${EB_BUCKET},S3Key=${S3_KEY}" \
            --process
          aws elasticbeanstalk update-environment \
            --environment-name "${EB_ENV}" \
            --version-label "${VERSION_LABEL}"
          aws elasticbeanstalk wait environment-updated \
            --environment-names "${EB_ENV}"

      - name: Verify API health (optional)
        if: >-
          vars.EB_ENVIRONMENT_NAME != '' &&
          vars.EB_HEALTH_CHECK_URL != ''
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsS "${{ vars.EB_HEALTH_CHECK_URL }}"; then
              exit 0
            fi
            sleep 15
          done
          echo "Health check failed: ${{ vars.EB_HEALTH_CHECK_URL }}"
          exit 1
